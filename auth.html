<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập CTV – Hoàng Kim Phát</title>
  <meta name="description" content="Đăng nhập hoặc đăng ký trở thành cộng tác viên Hoàng Kim Phát để tiếp cận kho sim phong thủy.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav scrolled" id="nav" role="navigation">
  <div class="nav__inner">
    <a href="index.html" class="nav__logo">
      <img src="img/logo.png" alt="Logo Hoàng Kim Phát" width="42" height="42">
      <div class="nav__logo-text">
        <span class="nav__logo-name">HOÀNG KIM PHÁT</span>
        <span class="nav__logo-tagline">Sim Kinh Dịch</span>
      </div>
    </a>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <div class="auth-card__logo">
      <img src="img/logo.png" alt="Logo" height="48">
      <span class="auth-card__brand">Cổng CTV</span>
    </div>

    <div class="auth-tabs" role="tablist">
      <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true" aria-controls="form-login">Đăng Nhập</button>
      <button class="auth-tab" id="tab-register" role="tab" aria-selected="false" aria-controls="form-register">Đăng Ký CTV</button>
    </div>

    <!-- LOGIN FORM -->
    <form class="auth-form" id="form-login" role="tabpanel" aria-labelledby="tab-login" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-email">Email</label>
        <input class="form-input" type="email" id="login-email" name="login-email" placeholder="ctv@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Mật khẩu</label>
        <input class="form-input" type="password" id="login-password" name="login-password" placeholder="••••••••" required autocomplete="current-password" minlength="8">
      </div>
      <button class="form-submit" type="submit" id="btn-login">Đăng Nhập</button>
      <div class="auth-alert" id="alert-login" role="alert" aria-live="polite"></div>
      <p style="text-align:center;font-size:.78rem;color:var(--muted);margin-top:.5rem">
        <a href="#" id="forgot-link" style="color:var(--gold)">Quên mật khẩu?</a>
      </p>
    </form>

    <!-- REGISTER FORM -->
    <form class="auth-form" id="form-register" role="tabpanel" aria-labelledby="tab-register" novalidate style="display:none">
      <div class="form-group">
        <label class="form-label" for="reg-name">Họ và tên</label>
        <input class="form-input" type="text" id="reg-name" name="reg-name" placeholder="Nguyễn Văn A" required autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-phone">Số điện thoại</label>
        <input class="form-input" type="tel" id="reg-phone" name="reg-phone" placeholder="0932.60.1616" required autocomplete="tel">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Email</label>
        <input class="form-input" type="email" id="reg-email" name="reg-email" placeholder="ctv@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Mật khẩu (tối thiểu 8 ký tự)</label>
        <input class="form-input" type="password" id="reg-password" name="reg-password" placeholder="••••••••" required autocomplete="new-password" minlength="8">
      </div>
      <p style="font-size:.78rem;color:var(--muted);line-height:1.7;padding:.75rem 1rem;background:var(--gold-pale);border:1px solid var(--gold-border);border-radius:8px">
        Sau khi đăng ký, tài khoản CTV sẽ được xét duyệt trong <strong style="color:var(--cream)">1–2 ngày làm việc</strong>. Bạn sẽ nhận email xác nhận khi được kích hoạt.
      </p>
      <button class="form-submit" type="submit" id="btn-register">Gửi Đơn Đăng Ký</button>
      <div class="auth-alert" id="alert-register" role="alert" aria-live="polite"></div>
    </form>
  </div>
</main>

<script src="js/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/page-auth.js"></script>
</body>
</html>
